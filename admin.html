<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira WiFi - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            color: #1A1A1A;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            background: #1A1A1A;
            padding: 16px 20px;
            text-align: center;
        }

        .top-bar .brand {
            color: #E4032E;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .top-bar .admin-badge {
            color: #888;
            font-size: 13px;
            font-weight: 500;
            margin-left: 8px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 24px 0 20px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #888;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-of-type { margin-bottom: 0; }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #F9F9F9;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            color: #1A1A1A;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #E4032E;
            background: #fff;
        }

        input::placeholder { color: #CCC; }

        .save-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #E4032E;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
        }

        .save-btn:active { transform: scale(0.98); opacity: 0.9; }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .save-btn.success { background: #2E7D32; }

        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #888;
            min-height: 20px;
        }

        .status.success { color: #2E7D32; }
        .status.error { color: #E4032E; }

        .current-values h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 12px;
        }

        .current-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #F0F0F0;
            font-size: 14px;
        }

        .current-row:last-of-type { border-bottom: none; }

        .current-label { color: #888; }
        .current-value { color: #1A1A1A; font-weight: 600; }

        .test-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #E4032E;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: #BBB;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">free</span>
        <span class="admin-badge">— Admin</span>
    </div>

    <div class="container">
        <div class="header">
            <h1>⚙️ Configuration WiFi</h1>
            <p>Modifier les identifiants pour la démo</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Nom du réseau (SSID)</label>
                <input type="text" id="ssid-input" placeholder="Ex: Freebox-ABC123">
            </div>
            <div class="form-group">
                <label>Clé WiFi</label>
                <input type="text" id="key-input" placeholder="Ex: a1b2c3d4e5f6">
            </div>
            <button class="save-btn" onclick="saveConfig()">
                💾 Enregistrer
            </button>
            <div class="status" id="status"></div>
        </div>

        <div class="card current-values">
            <h3>🔧 Configuration actuelle</h3>
            <div class="current-row">
                <span class="current-label">SSID</span>
                <span class="current-value" id="current-ssid">Chargement...</span>
            </div>
            <div class="current-row">
                <span class="current-label">Clé WiFi</span>
                <span class="current-value" id="current-key">Chargement...</span>
            </div>
            <div class="current-row">
                <span class="current-label">Dernière modif</span>
                <span class="current-value" id="current-date">-</span>
            </div>
            <a href="./index.html" target="_blank" class="test-link">
                🔗 Voir la page abonné →
            </a>
        </div>

        <div class="footer">
            Mira — Configuration réservée aux tests
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvQlwGOv6dxN9Z3eLkAZfXnzqkslj5UlE",
            authDomain: "assistant-support-ia.firebaseapp.com",
            databaseURL: "https://assistant-support-ia-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "assistant-support-ia",
            storageBucket: "assistant-support-ia.firebasestorage.app",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function loadConfig() {
            try {
                const snapshot = await db.ref('mira_wifi/demo').get();
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('ssid-input').value = data.ssid || '';
                    document.getElementById('key-input').value = data.key || '';
                    document.getElementById('current-ssid').textContent = data.ssid || '(non défini)';
                    document.getElementById('current-key').textContent = data.key || '(non défini)';
                    
                    if (data.updated_at) {
                        const d = new Date(data.updated_at);
                        document.getElementById('current-date').textContent = d.toLocaleString('fr-FR');
                    }
                } else {
                    document.getElementById('current-ssid').textContent = '(non défini)';
                    document.getElementById('current-key').textContent = '(non défini)';
                }
            } catch (e) {
                console.error('Erreur:', e);
            }
        }

        async function saveConfig() {
            const ssid = document.getElementById('ssid-input').value.trim();
            const key = document.getElementById('key-input').value.trim();
            const btn = document.querySelector('.save-btn');
            const status = document.getElementById('status');

            if (!ssid || !key) {
                status.textContent = '⚠️ Remplissez les deux champs';
                status.className = 'status error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enregistrement...';
            status.textContent = '';

            try {
                await db.ref('mira_wifi/demo').set({
                    ssid: ssid,
                    key: key,
                    updated_at: new Date().toISOString(),
                });

                btn.textContent = '✅ Enregistré !';
                btn.classList.add('success');
                status.textContent = 'Configuration mise à jour';
                status.className = 'status success';

                document.getElementById('current-ssid').textContent = ssid;
                document.getElementById('current-key').textContent = key;
                document.getElementById('current-date').textContent = new Date().toLocaleString('fr-FR');

                setTimeout(() => {
                    btn.textContent = '💾 Enregistrer';
                    btn.classList.remove('success');
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                console.error('Erreur:', e);
                btn.textContent = '💾 Enregistrer';
                btn.disabled = false;
                status.textContent = '❌ Erreur : ' + e.message;
                status.className = 'status error';
            }
        }

        loadConfig();
    </script>
</body>
</html>
